<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>iCloudVault - 独立相册</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: 'Segoe UI', Roboto, sans-serif; background:#0f0f0f; color:#fff; height:100vh; display:flex; flex-direction:column; }
.header { background:#1a1a2e; padding:12px 16px; display:flex; align-items:center; gap:12px; position:sticky; top:0; z-index:10; }
.header h1 { font-size:20px; font-weight:500; }
.tabs { display:flex; gap:4px; padding:12px 16px; overflow-x:auto; }
.tab { padding:8px 20px; border-radius:20px; border:1px solid #333; background:transparent; color:#aaa; font-size:14px; white-space:nowrap; cursor:pointer; }
.tab.active { background:#bb86fc; color:#000; border-color:#bb86fc; }
.search-bar { margin:0 16px 12px; display:flex; gap:8px; }
.search-bar input { flex:1; padding:10px 16px; border-radius:24px; border:none; background:#1e1e2e; color:#fff; font-size:14px; outline:none; }
.photo-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:3px; padding:0 3px; overflow-y:auto; flex:1; }
.photo-grid img { width:100%; aspect-ratio:1; object-fit:cover; cursor:pointer; border-radius:2px; }
.fab { position:fixed; bottom:24px; right:24px; width:56px; height:56px; border-radius:50%; background:#bb86fc; color:#000; border:none; font-size:28px; cursor:pointer; box-shadow:0 4px 12px rgba(187,134,252,0.4); }
.bottom-nav { display:flex; justify-content:space-around; padding:8px 0 4px; background:#1a1a2e; border-top:1px solid #222; }
.nav-item { display:flex; flex-direction:column; align-items:center; gap:2px; color:#888; font-size:11px; background:none; border:none; cursor:pointer; padding:4px 12px; }
.nav-item.active { color:#bb86fc; }
.nav-item svg { width:24px; height:24px; }
</style>
</head>
<body>

<div class="header">
  <svg width="28" height="28" viewBox="0 0 24 24" fill="#bb86fc"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="#bb86fc" stroke-width="2" fill="none"/></svg>
  <h1>私密相册</h1>
  <span style="margin-left:auto;color:#888;font-size:13px;">iCloud Drive</span>
</div>

<div class="tabs">
  <button class="tab active">全部</button>
  <button class="tab">人物</button>
  <button class="tab">风景</button>
  <button class="tab">文档</button>
  <button class="tab">宠物</button>
  <button class="tab">食物</button>
</div>

<div style="padding:0 16px 12px;display:flex;gap:8px;align-items:center;">
  <span style="font-size:13px;color:#888;">2,249 张</span>
  <span style="font-size:13px;color:#888;">·</span>
  <span style="font-size:13px;color:#888;">2024.10 - 2026.05</span>
  <span style="margin-left:auto;font-size:13px;color:#bb86fc;">🔍 AI 已分类</span>
</div>

<div class="search-bar">
  <input type="text" placeholder="搜索照片，例如：去年夏天在海边..." id="search">
  <button style="background:#bb86fc;color:#000;border:none;border-radius:50%;width:40px;height:40px;font-size:18px;cursor:pointer;">🔍</button>
</div>

<div class="photo-grid" id="grid">
  <div style="background:#2a2a3a;display:flex;align-items:center;justify-content:center;aspect-ratio:1;border-radius:2px;">
    <span style="font-size:40px;">🏞️</span>
  </div>
  <div style="background:#2a2a3a;display:flex;align-items:center;justify-content:center;aspect-ratio:1;border-radius:2px;">
    <span style="font-size:40px;">👤</span>
  </div>
  <div style="background:#2a2a3a;display:flex;align-items:center;justify-content:center;aspect-ratio:1;border-radius:2px;">
    <span style="font-size:40px;">📄</span>
  </div>
  <!-- placeholder grid -->
  <script>
  for(let i=4;i<=30;i++){
    let emojis = ['🌅','🏔️','🌊','🐱','🍜','📱','🎨','🌸','🏠','✈️','🎂','⚽'];
    let e = emojis[i%emojis.length];
    document.write(`<div style="background:#2a2a3a;display:flex;align-items:center;justify-content:center;aspect-ratio:1;border-radius:2px;"><span style="font-size:40px;">${e}</span></div>`);
  }
  </script>
</div>

<button class="fab" title="导入照片">+</button>

<div class="bottom-nav">
  <button class="nav-item active">
    <svg viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    相册
  </button>
  <button class="nav-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
    分类
  </button>
  <button class="nav-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    搜索
  </button>
  <button class="nav-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    时间线
  </button>
</div>

</body>
</html>
